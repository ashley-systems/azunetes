---
- name: Apply common host settings
  hosts: all
  become: true
  gather_facts: true

  roles:
    - role: common

- name: Install Kubernetes base components (kubelet / kubectl)
  hosts:
    - controlplane
    - worker
  become: true
  tasks:
    - name: Ensure Kubernetes APT repository is configured
      ansible.builtin.include_role:
        name: kubernetes_apt_repo
    - name: Apply any pending handler runs before next roles
      ansible.builtin.meta: flush_handlers
    - name: Install kubelet and kubectl
      ansible.builtin.include_role:
        name: kubelet_kubectl

- name: Install kubeadm on control plane nodes
  hosts: controlplane
  become: true
  tasks:
    - name: Ensure Kubernetes APT repository is configured
      ansible.builtin.include_role:
        name: kubernetes_apt_repo
    - name: Apply any pending handler runs before kubeadm role
      ansible.builtin.meta: flush_handlers
    - name: Install kubeadm
      ansible.builtin.include_role:
        name: kubeadm
