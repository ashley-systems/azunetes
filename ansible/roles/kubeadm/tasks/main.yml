---
- name: Install kubeadm package at pinned version
  ansible.builtin.apt:
    name: "{{ kubeadm_package_name }}={{ kubeadm_kubernetes_version }}"
    state: present
    update_cache: false

- name: Hold kubeadm package to prevent unintended upgrades
  ansible.builtin.command:
    cmd: "apt-mark hold {{ kubeadm_package_name }}"
  register: kubeadm_apt_mark_result
  changed_when: >
    'set on hold' in (kubeadm_apt_mark_result.stdout | default(''))
    and 'already' not in (kubeadm_apt_mark_result.stdout | default('') | lower)
