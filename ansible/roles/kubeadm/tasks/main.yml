---
- name: Install kubeadm package
  ansible.builtin.apt:
    name: "{{ kubeadm_package_name }}"
    state: present
    update_cache: false

- name: Hold kubeadm package to prevent unintended upgrades
  ansible.builtin.command:
    cmd: "apt-mark hold {{ kubeadm_package_name }}"
  register: kubeadm_apt_mark_result
  changed_when: "'set on hold' in kubeadm_apt_mark_result.stdout"
