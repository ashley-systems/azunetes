---
- name: Install kubelet and kubectl packages
  ansible.builtin.apt:
    name: "{{ kubelet_kubectl_packages }}"
    state: present
    update_cache: false

- name: Hold kubelet and kubectl packages to prevent unintended upgrades
  ansible.builtin.command:
    cmd: "apt-mark hold {{ item }}"
  loop: "{{ kubelet_kubectl_packages }}"
  register: kubelet_kubectl_apt_mark_result
  changed_when: >
    'set on hold' in (kubelet_kubectl_apt_mark_result.stdout | default('')) or
    'set on hold' in (item.stdout | default(''))
